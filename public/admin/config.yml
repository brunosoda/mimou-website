# Sveltia CMS config for Mimou.
#
# AFTER DEPLOYMENT — you need to:
#   1) Push this repo to GitHub, replace OWNER/REPO below.
#   2) Create a GitHub OAuth App (Settings → Developer settings → OAuth Apps):
#        Homepage URL:        https://your-deployed-site.example
#        Authorization URL:   https://your-deployed-site.example/admin/
#      Copy the Client ID + Secret.
#   3) Register the Client ID/Secret with the auth relay:
#        - Easiest: use the community-hosted relay at
#          https://sveltia-cms-auth.deno.dev (fill in the callback there)
#        - Or self-host in 2 min: https://github.com/sveltia/sveltia-cms-auth
#
backend:
  name: github
  repo: OWNER/REPO           # <-- set to "user/repo" after pushing
  branch: main
  base_url: https://sveltia-cms-auth.deno.dev   # OAuth relay (or self-hosted)

# LOCAL DEV — uncomment to edit against the working tree without deploying.
# Requires running `npx decap-server` in a second terminal.
# local_backend: true

# Where uploaded images land, and how the site references them.
# Sveltia writes files here; Astro serves /public/* at the site root.
media_folder: public/products
public_folder: /products

# Copy in the browser: Portuguese so it's friendly to whoever edits.
locale: pt

collections:
  - name: catalogo
    label: 'Catálogo'
    label_singular: 'Catálogo'
    description: 'Todos os produtos da Mimou. Edite preços, descrições, fotos e ordem.'
    files:
      - name: produtos
        label: 'Produtos'
        file: 'src/data/products.json'
        format: json
        fields:
          - name: products
            label: 'Produtos'
            label_singular: 'Produto'
            widget: list
            summary: '{{fields.name}} — R$ {{fields.price}}'
            fields:
              - { name: name,        label: 'Nome',                             widget: string }
              - { name: category,    label: 'Categoria',                        widget: select, options: [
                  { label: 'Ofertas',          value: 'ofertas' },
                  { label: 'Mimou Signature',  value: 'signature' },
                  { label: 'Buquês',           value: 'buques' },
                  { label: 'Cestas',           value: 'cestas' },
                  { label: 'Aniversário',      value: 'aniversario' }
                ] }
              - { name: price,       label: 'Preço (R$)',                       widget: number, value_type: float, step: 0.01, min: 0 }
              - { name: priceOld,    label: 'Preço "de" (para exibir riscado)', widget: number, value_type: float, step: 0.01, required: false }
              - { name: priceFrom,   label: 'Mostrar "A partir de"',            widget: boolean, required: false, default: false }
              - { name: description, label: 'Descrição',                        widget: text }
              - name: contains
                label: 'O que acompanha'
                widget: list
                required: false
                field: { name: item, label: 'Item', widget: string }
              - { name: image,       label: 'Foto',                             widget: image, required: false, choose_url: false }
              - { name: slug,        label: 'Slug (URL interna)',               widget: string, hint: 'Não mexa a menos que saiba o que faz. Ex: cesta-le-jardin-rose' }

# Small quality-of-life extras
editor:
  preview: false     # no live preview — the site is separate from the CMS UI
